<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Defense</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; display: flex; flex-direction: column; }
      #game { display: block; width: 100%; flex: 1; min-height: 0; }
      #upgrade-bars {
        display: flex;
        flex-wrap: nowrap;
        height: 52px;
        background: #0a0a0f;
        border-top: 1px solid rgba(0, 255, 204, 0.3);
      }
      .player-upgrade-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        flex: 1;
        min-width: 0;
        background: #1a1a2e;
        padding: 0 6px;
      }
      .player-upgrade-bar + .player-upgrade-bar { border-left: 1px solid rgba(0, 255, 204, 0.2); }
      .player-upgrade-bar button {
        padding: 6px 10px;
        font-family: monospace;
        font-size: 11px;
        font-weight: 600;
        color: #00ffcc;
        background: rgba(0, 255, 204, 0.1);
        border: 1px solid #00ffcc;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.15s, box-shadow 0.15s, opacity 0.15s;
      }
      .player-upgrade-bar button:hover:not(:disabled) {
        background: rgba(0, 255, 204, 0.2);
        box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
      }
      .player-upgrade-bar button:active:not(:disabled) {
        background: rgba(0, 255, 204, 0.25);
      }
      .player-upgrade-bar button:disabled,
      .player-upgrade-bar button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
        color: #556;
        border-color: #334;
        background: rgba(20, 20, 30, 0.8);
        box-shadow: none;
      }
      .player-upgrade-bar.is-game-over {
        opacity: 0.6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="800" height="600"></canvas>
    <div id="upgrade-bars"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
